<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>BarberFlow</title>

<style>

body {

    margin:0;
    font-family:Arial,sans-serif;

    background-image:url("https://images.pexels.com/photos/13138476/pexels-photo-13138476.jpeg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}


.container {

    background:rgba(0,0,0,0.75);

    padding:35px 25px;

    border-radius:20px;

    width:90%;

    max-width:500px;

    text-align:center;

}


h1 {

     font-size:45px;

    margin-bottom:25px;

}


p {



     font-size:24px;

    margin:20px 0;

    }


a {

    text-decoration:none;

}
    button {

    width:100%;

    padding:22px;

    margin-top:20px;

    border:0;

    border-radius:15px;

    background:#c89b3c;

    color:white;

    font-size:24px;

    cursor:pointer;

    }


.area {

    margin-top:30px;

    font-size:14px;

}


</style>

</head>


<body>


<div class="container">


<h1>💈 BarberFlow</h1>


<p>
Agende seu horário
</p>


<a href="/agenda">

<button>
📅 Agendar horário
</button>

</a>



<div class="area">

<a href="/login">

<button>
🔒 Área do barbeiro
</button>

</a>

</div>


</div>


</body>

</html>
